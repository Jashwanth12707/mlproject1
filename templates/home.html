<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Exam Performance Indicator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-7">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">

                        <h2 class="text-center">
                            Student Exam Performance Predictor
                        </h2>

                    </div>

                    <div class="card-body">

                        <form action="{{ url_for('predict_data') }}" method="POST">

                            <div class="mb-3">

                                <label class="form-label">Gender</label>

                                <select class="form-select" name="gender" required>

                                    <option selected disabled value="">
                                        Select Gender
                                    </option>

                                    <option value="male">
                                        Male
                                    </option>

                                    <option value="female">
                                        Female
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Race or Ethnicity
                                </label>

                                <select class="form-select" name="race_ethnicity" required>

                                    <option selected disabled value="">
                                        Select Ethnicity
                                    </option>

                                    <option value="group A">Group A</option>
                                    <option value="group B">Group B</option>
                                    <option value="group C">Group C</option>
                                    <option value="group D">Group D</option>
                                    <option value="group E">Group E</option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Parental Level of Education
                                </label>

                                <select class="form-select" name="parental_level_of_education" required>

                                    <option selected disabled value="">
                                        Select Parent Education
                                    </option>

                                    <option value="some high school">
                                        Some High School
                                    </option>

                                    <option value="high school">
                                        High School
                                    </option>

                                    <option value="some college">
                                        Some College
                                    </option>

                                    <option value="associate's degree">
                                        Associate's Degree
                                    </option>

                                    <option value="bachelor's degree">
                                        Bachelor's Degree
                                    </option>

                                    <option value="master's degree">
                                        Master's Degree
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Lunch Type
                                </label>

                                <select class="form-select" name="lunch" required>

                                    <option selected disabled value="">
                                        Select Lunch Type
                                    </option>

                                    <option value="standard">
                                        Standard
                                    </option>

                                    <option value="free/reduced">
                                        Free / Reduced
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Test Preparation Course
                                </label>

                                <select class="form-select" name="test_preparation_course" required>

                                    <option selected disabled value="">
                                        Select Course Status
                                    </option>

                                    <option value="none">
                                        None
                                    </option>

                                    <option value="completed">
                                        Completed
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Reading Score
                                </label>

                                <input type="number" class="form-control" name="reading_score"
                                    placeholder="Enter Reading Score" min="0" max="100" required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Writing Score
                                </label>

                                <input type="number" class="form-control" name="writing_score"
                                    placeholder="Enter Writing Score" min="0" max="100" required>

                            </div>

                            <div class="d-grid">

                                <button type="submit" class="btn btn-primary btn-lg">

                                    Predict Math Score

                                </button>

                            </div>

                        </form>

                        <hr>

                        <h3 class="text-center text-success">

                            {{ results }}

                        </h3>

                    </div>

                </div>

            </div>

        </div>

    </div>


</body>

</html>
